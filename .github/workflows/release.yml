name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building release for v$VERSION"

      - name: Package source
        run: |
          mkdir -p release
          cp -r src/ release/
          cp manifest.json README.md LICENSE CHANGELOG.md icon.png release/
          cp -r docs/ release/
          cd release
          zip -r ../DspUniversalDepot-v${{ steps.version.outputs.version }}-source.zip .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: |
            ## DspUniversalDepot v${{ steps.version.outputs.version }}

            ### Installation
            1. Install [BepInEx 5.4.x](https://thunderstore.io/c/dyson-sphere-program/p/BepInEx/BepInExPack/) for DSP
            2. Install [LDBTool](https://thunderstore.io/c/dyson-sphere-program/p/xiaoye97/LDBTool/) (required)
            3. **r2modman users:** download the `DspUniversalDepot-*_r2modman.zip` asset and import it in r2modman.
            4. **Manual install:** download `DspUniversalDepot.dll` from the r2modman zip and drop it into `BepInEx/plugins/`.
            5. Launch DSP — config at `BepInEx/config/com.boehla.dspuniversaldepot.cfg`

            > The compiled `DspUniversalDepot.dll` is built locally against the proprietary
            > DSP `Assembly-CSharp.dll` (which cannot be redistributed via CI). The r2modman
            > zip (containing the DLL plus manifest/icon/docs) is committed under `releases/`
            > and re-attached here. The source zip is provided for reference.

            See [README.md](https://github.com/boehla/DspUniversalDepot#readme) for full docs.
          files: |
            DspUniversalDepot-v${{ steps.version.outputs.version }}-source.zip
            releases/DspUniversalDepot-v${{ steps.version.outputs.version }}-r2modman.zip
          draft: false
          prerelease: false
